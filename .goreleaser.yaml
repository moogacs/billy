# https://goreleaser.com
version: 2

project_name: billbot

before:
  hooks:
    - go mod tidy

builds:
  - id: billbot
    env:
      - CGO_ENABLED=0
    main: ./cmd/billbot
    binary: billbot
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s
      - -w
      - -X=main.version={{.Version}}
      - -X=main.commit={{.Commit}}
      - -X=main.date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

brews:
  - name: billbot
    repository:
      owner: moogacs
      name: homebrew-billbot
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: goreleaser@github.com
    homepage: https://github.com/moogacs/billbot
    description: "Privacy-first CLI: read Claude Code, Codex, and Cursor logs on disk; apply YAML rates; print estimated USD."
    license: Apache-2.0
    install: |
      bin.install "billbot"
    test: |
      system "#{bin}/billbot", "--version"
